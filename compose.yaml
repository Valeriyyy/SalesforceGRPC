services:
  postgres:
    image: postgres:16-alpine
    container_name: salesforcegrpc-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salesforcegrpc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  salesforcegrpc:
    image: salesforcegrpc
    build:
      context: .
      dockerfile: SalesforceGrpc/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
